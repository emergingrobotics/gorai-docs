## Usage in Gorai CLI

### Component Search

The CLI uses this metadata for search:

```bash
$ gorai component search imu

github.com/robotics-lab/gorai-component-imu v1.2.3
  High-precision IMU drivers with advanced calibration
  Provides: sensor/bno085, sensor/icm42688
  License: MIT | Platforms: linux/arm64, linux/amd64
  ★ Stable | Last updated: 2026-01-10
```

