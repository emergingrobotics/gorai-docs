## Validation

Components can be validated using the Gorai CLI:

```bash
gorai component validate .
```

This checks:
- `gorai-component.yaml` exists at repository root
- YAML is valid and conforms to schema
- All `provides` entries have corresponding `init()` registrations
- Version matches git tag (if tagged)
- Required files exist (LICENSE, README.md)
- Tests pass (`go test ./...`)
- Configuration examples in README match schema

