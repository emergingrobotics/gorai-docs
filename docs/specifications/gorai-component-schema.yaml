## Best Practices

### 1. Keep Metadata Accurate

Update `gorai-component.yaml` whenever you:
- Add new models
- Change configuration schema
- Update compatibility requirements
- Release new versions

### 2. Use Semantic Versioning

- **v1.0.0**: Initial stable release
- **v1.1.0**: Add new features (backward compatible)
- **v1.0.1**: Bug fixes
- **v2.0.0**: Breaking changes

Update `component.version` to match git tags.

### 3. Document Configuration

Provide clear descriptions for all configuration attributes:
- What does it do?
- What are valid values?
- What's the default?
- Give an example

### 4. Declare All Dependencies

List system packages and external dependencies so users know what to install.

### 5. Maintain Quality Metrics

Keep `quality` section up to date:
- Link to CI status badge
- Update test coverage
- Mark if examples are included

