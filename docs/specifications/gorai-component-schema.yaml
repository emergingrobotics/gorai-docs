## Future Extensions

Planned additions to schema v2.0:

- **Performance metrics**: Expected latency, throughput
- **Power consumption**: Estimated power draw
- **Security**: CVE tracking, security audit status
- **Certification**: Hardware certifications (CE, FCC, etc.)
- **Pricing**: Commercial licensing information
- **Analytics**: Anonymous usage statistics opt-in

