# Gorai NATS Configuration
# /etc/nats/nats.conf (Linux) or ~/gorai-nats.conf (macOS dev)

# Server identification
server_name: gorai-nats

# Client connections
port: 4222
host: 0.0.0.0

# HTTP monitoring
http_port: 8222

# Maximum payload (10MB for images/point clouds)
max_payload: 10485760

# Connection limits
max_connections: 1024
max_subscriptions: 0  # unlimited

# Logging
debug: false
trace: false
logtime: true
# log_file: "/var/log/nats/nats.log"  # Linux production
# log_file: "/tmp/nats.log"            # macOS dev

# JetStream configuration
jetstream {
    # Linux production:
    # store_dir: "/var/lib/nats/jetstream"

    # Development/testing:
    store_dir: "/tmp/nats-data"

    # Memory and storage limits
    max_memory_store: 1GB
    max_file_store: 10GB
}

# Authorization (optional, uncomment for production)
# authorization {
#     users = [
#         { user: gorai, password: $GORAI_NATS_PASSWORD }
#     ]
# }

# TLS configuration (optional, uncomment for production)
# tls {
#     cert_file: "/etc/nats/server-cert.pem"
#     key_file: "/etc/nats/server-key.pem"
#     ca_file: "/etc/nats/ca.pem"
#     verify: true
# }

# Cluster configuration (optional, for multi-node deployments)
# cluster {
#     name: gorai-cluster
#     port: 6222
#     routes: [
#         nats://nats-1:6222
#         nats://nats-2:6222
#     ]
# }
