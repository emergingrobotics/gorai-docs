## Example: Complete Component Metadata

```yaml
schema_version: "1.0"

component:
  name: "advanced-imu"
  repository: "github.com/robotics-lab/gorai-component-imu"
  version: "v1.2.3"

  provides:
    - type: "sensor"
      model: "bno085"
      description: "Bosch BNO085 9-DOF IMU with sensor fusion"
    - type: "sensor"
      model: "icm42688"
      description: "TDK ICM-42688-P 6-axis IMU"

  compatibility:
    gorai_version: ">=0.3.0, <1.0.0"
    platforms:
      - "linux/arm64"
      - "linux/amd64"
    go_version: ">=1.22"

  author: "Robotics Lab"
  license: "MIT"
  description: "High-precision IMU drivers with advanced calibration and filtering"
  homepage: "https://github.com/robotics-lab/gorai-component-imu"
  documentation: "https://docs.robotics-lab.com/gorai-imu"

  support:
    email: "support@robotics-lab.com"
    url: "https://github.com/robotics-lab/gorai-component-imu/issues"
    chat: "https://discord.gg/robotics-lab"

  keywords:
    - "imu"
    - "sensor"
    - "9dof"
    - "accelerometer"
    - "gyroscope"
    - "magnetometer"

  hardware_requirements:
    i2c: true
    gpio: false
    spi: false
    uart: false

  configuration:
    i2c_bus:
      type: "int"
      required: true
      description: "I2C bus number (e.g., 1 for /dev/i2c-1)"
      example: 1
      range: [0, 10]

    i2c_address:
      type: "int"
      required: false
      default: 0x4A
      description: "I2C device address (7-bit)"
      example: 0x4A
      range: [0x00, 0x7F]

    update_rate_hz:
      type: "int"
      required: false
      default: 100
      description: "Sensor update rate in Hz"
      enum: [50, 100, 200, 400]

    enable_calibration:
      type: "bool"
      required: false
      default: true
      description: "Enable automatic calibration on startup"

    calibration_file:
      type: "string"
      required: false
      description: "Path to calibration data file"
      example: "/etc/gorai/imu_calibration.json"

    filter_type:
      type: "string"
      required: false
      default: "madgwick"
      description: "Sensor fusion filter algorithm"
      enum: ["madgwick", "mahony", "complementary", "kalman"]

    advanced_settings:
      type: "object"
      required: false
      description: "Advanced configuration options (see documentation)"

  dependencies:
    system_packages:
      - "libi2c-dev"
      - "i2c-tools"
    go_modules:
      - module: "periph.io/x/conn/v3"
        version: "v3.7.0"

  quality:
    ci_status: "https://github.com/robotics-lab/gorai-component-imu/actions"
    test_coverage: 87
    has_examples: true
    has_integration_tests: true

  metadata:
    first_released: "2025-06-15"
    last_updated: "2026-01-10"
    maturity: "stable"
    maintained: true
```

