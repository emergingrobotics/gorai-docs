<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .Title }}{{ .Title }} | {{ end }}{{ .Site.Title }}</title>
  <meta name="description" content="{{ .Description | default .Site.Params.description }}">
  <style>
    :root {
      --primary: #663399;
      --text: #333;
      --bg: #fff;
      --code-bg: #f5f5f5;
      --border: #ddd;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      line-height: 1.6;
      color: var(--text);
      background: var(--bg);
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 1rem;
    }
    header {
      background: var(--primary);
      color: white;
      padding: 1rem 0;
    }
    header a { color: white; text-decoration: none; }
    header nav { display: flex; gap: 1.5rem; align-items: center; }
    header nav a:hover { text-decoration: underline; }
    header h1 { margin: 0; font-size: 1.5rem; }
    main { padding: 2rem 0; }
    h1, h2, h3, h4 { color: #1a1a1a; margin-top: 1.5rem; }
    h1 { border-bottom: 2px solid var(--primary); padding-bottom: 0.5rem; }
    a { color: var(--primary); }
    code {
      font-family: "SF Mono", Monaco, monospace;
      background: var(--code-bg);
      padding: 0.2em 0.4em;
      border-radius: 3px;
      font-size: 0.9em;
    }
    pre {
      background: #282c34;
      color: #abb2bf;
      padding: 1rem;
      border-radius: 6px;
      overflow-x: auto;
    }
    pre code { background: none; color: inherit; padding: 0; }
    table { border-collapse: collapse; width: 100%; margin: 1rem 0; }
    th, td { border: 1px solid var(--border); padding: 0.5rem; text-align: left; }
    th { background: var(--code-bg); }
    footer { border-top: 1px solid var(--border); padding: 2rem 0; margin-top: 3rem; color: #666; }
    .callout { margin: 1rem 0; padding: 1rem; border-radius: 4px; border-left: 4px solid; }
    .callout-info { background: #e7f3ff; border-color: #2196F3; }
    .callout-warning { background: #fff3e0; border-color: #ff9800; }
    .callout-title { font-weight: bold; margin-bottom: 0.5rem; }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <nav>
        <h1><a href="/">{{ .Site.Title }}</a></h1>
        {{ range .Site.Menus.main }}
        <a href="{{ .URL }}">{{ .Name }}</a>
        {{ end }}
      </nav>
    </div>
  </header>
  <main class="container">
    {{ block "main" . }}{{ end }}
  </main>
  <footer>
    <div class="container">
      <p>Copyright &copy; {{ now.Year }} Greg Herlein &amp; Luca Herlein. Apache 2.0 License.</p>
      <p><em>Pronounced "go-ray" (like "sting-ray")</em></p>
    </div>
  </footer>
</body>
</html>
